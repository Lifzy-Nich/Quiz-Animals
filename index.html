<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tebak Hewan</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .game-container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 800px;
            padding: 30px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        .question-box {
            background-color: #ecf0f1;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            font-size: 1.8em;
            font-weight: bold;
            color: #2c3e50;
        }
        .image-container {
            margin: 20px auto;
            width: 100%;
            max-width: 600px;
            height: 400px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        #animal-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }
        .options-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .option-btn {
            padding: 15px;
            font-size: 1.2em;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .option-btn:hover {
            background-color: #2980b9;
            transform: translateY(-3px);
        }
        .option-btn.correct {
            background-color: #2ecc71;
        }
        .option-btn.incorrect {
            background-color: #e74c3c;
        }
        .feedback {
            font-size: 1.5em;
            font-weight: bold;
            margin: 20px 0;
            min-height: 30px;
        }
        .score-board {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
        }
        .btn-restart {
            padding: 12px 25px;
            font-size: 1.1em;
            background-color: #9b59b6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s ease;
        }
        .btn-restart:hover {
            background-color: #8e44ad;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Tebak Hewan</h1>
        <div class="question-box">Hewan apakah ini?</div>
        <div class="image-container">
            <img id="animal-image" src="" alt="Gambar Hewan">
        </div>
        <div class="options-container" id="options-container"></div>
        <div class="feedback" id="feedback"></div>
        <div class="score-board">
            <div>Skor: <span id="score">0</span></div>
            <div>Sisa Nyawa: <span id="lives">3</span></div>
            <div>Benar Berturut-turut: <span id="streak">0</span></div>
        </div>
        <button class="btn-restart" onclick="restartGame()">Main Lagi</button>
    </div>

    <script>
        const animals = [
            { name: "Gajah", scientificName: "elephant", clue: "Memiliki belalai panjang dan gading." },
            { name: "Harimau", scientificName: "tiger", clue: "Bertubuh besar dengan corak belang putih-hitam." },
            { name: "Beruang Kutub", scientificName: "polar bear", clue: "Berbulu putih tebal dan tinggal di daerah kutub." },
            { name: "Kucing", scientificName: "cat", clue: "Peliharaan rumah dengan telinga runcing dan ekor panjang." },
            { name: "Anjing", scientificName: "dog", clue: "Teman setia manusia dengan indera penciuman tajam." },
            { name: "Kuda", scientificName: "horse", clue: "Berkaki empat dengan surai di leher." },
            { name: "Ayam", scientificName: "chicken", clue: "Unggas yang sering dipelihara untuk telur." },
            { name: "Sapi", scientificName: "cow", clue: "Berkaki empat menghasilkan susu." },
            { name: "Domba", scientificName: "sheep", clue: "Berbulu tebal dan menghasilkan wol." },
            { name: "Kambing", scientificName: "goat", clue: "Memiliki jenggot dan suka memanjat." },
            { name: "Babi", scientificName: "pig", clue: "Bertubuh besar dengan moncong panjang." },
            { name: "Burung", scientificName: "bird", clue: "Memiliki sayap dan bisa terbang." },
            { name: "Ikan", scientificName: "fish", clue: "Hidup di air dan bernapas dengan insang." },
            { name: "Ular", scientificName: "snake", clue: "Bertubuh panjang tanpa kaki." },
            { name: "Kura-kura", scientificName: "turtle", clue: "Memiliki tempurung keras dan berjalan lambat." },
            { name: "Kera", scientificName: "monkey", clue: "Aktif dan suka memanjat pohon." },
            { name: "Zebra", scientificName: "zebra", clue: "Bergaris hitam-putih seperti kuda." },
            { name: "Jerapah", scientificName: "giraffe", clue: "Memiliki leher sangat panjang." },
            { name: "Singa", scientificName: "lion", clue: "Raja hutan dengan surai tebal." },
            { name: "Panda", scientificName: "panda bear", clue: "Berbulu hitam-putih dan pemakan bambu." },
            { name: "Cheetah", scientificName: "cheetah", clue: "Hewan darat tercepat dengan bintik-bintik." },
            { name: "Macan Tutul", scientificName: "leopard", clue: "Bertubuh ramping dengan pola bercak khas." },
            { name: "Badak", scientificName: "rhinoceros", clue: "Bertubuh besar dengan satu atau dua tanduk." },
            { name: "Kuda Nil", scientificName: "hippopotamus", clue: "Sangat besar dan menghabiskan waktu di air." },
            { name: "Buaya", scientificName: "crocodile", clue: "Reptil besar dengan rahang kuat dan sisik keras." },
            { name: "Komodo", scientificName: "komodo dragon", clue: "Kadal terbesar di dunia dari Indonesia." },
            { name: "Orangutan", scientificName: "orangutan", clue: "Primata cerdas yang tinggal di hutan Kalimantan." },
            { name: "Gajah Sumatera", scientificName: "sumatran elephant", clue: "Subspesies gajah dengan ukuran lebih kecil." },
            { name: "Harimau Sumatera", scientificName: "sumatran tiger", clue: "Spesies harimau yang hanya ada di Sumatra." },
            { name: "Cendrawasih", scientificName: "bird of paradise", clue: "Burung eksotis dengan bulu indah dari Papua." }
        ];

        let currentAnimal = null;
        let score = 0;
        let lives = 3;
        let streak = 0;
        const maxOptions = 4;

        function getRandomAnimals(count) {
            const shuffled = [...animals].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        function getUnsplashImage(animalName) {
            // Gunakan encodeURIComponent untuk menangani spasi dalam nama ilmiah
            const keyword = encodeURIComponent(animalName.toLowerCase());
            // Gunakan random seed besar untuk variasi gambar yang lebih baik
            const seed = Math.floor(Math.random() * 10000);
            return `https://source.unsplash.com/1920x1080/?${keyword}&sig=${seed}`;
        }

        function loadNewQuestion() {
            const randomAnimals = getRandomAnimals(maxOptions);
            currentAnimal = randomAnimals[0];
            
            document.getElementById('animal-image').src = getUnsplashImage(currentAnimal.scientificName);
            document.getElementById('animal-image').onerror = function() {
                this.src = getUnsplashImage(currentAnimal.scientificName); // fallback jika error
            };

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            // Acak urutan opsi jawaban
            const shuffledOptions = [...randomAnimals].sort(() => 0.5 - Math.random());

            shuffledOptions.forEach(animal => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = animal.name;
                button.onclick = () => checkAnswer(animal);
                optionsContainer.appendChild(button);
            });

            document.getElementById('feedback').textContent = '';
        }

        function checkAnswer(selectedAnimal) {
            const feedbackElement = document.getElementById('feedback');
            const buttons = document.querySelectorAll('.option-btn');
            
            if (selectedAnimal.name === currentAnimal.name) {
                feedbackElement.textContent = 'Benar!';
                feedbackElement.style.color = '#2ecc71';
                
                // Tandai tombol benar
                buttons.forEach(btn => {
                    if (btn.textContent === currentAnimal.name) {
                        btn.classList.add('correct');
                    } else {
                        btn.disabled = true;
                    }
                });
                
                score += 10;
                streak++;
            } else {
                feedbackElement.textContent = `Salah! Jawabannya adalah ${currentAnimal.name}. ${currentAnimal.clue}`;
                feedbackElement.style.color = '#e74c3c';
                
                // Tandai tombol salah dan benar
                buttons.forEach(btn => {
                    btn.disabled = true;
                    if (btn.textContent === selectedAnimal.name) {
                        btn.classList.add('incorrect');
                    }
                    if (btn.textContent === currentAnimal.name) {
                        btn.classList.add('correct');
                    }
                });
                
                lives--;
                streak = 0;
            }
            
            updateScore();
            
            setTimeout(() => {
                if (lives > 0) {
                    loadNewQuestion();
                } else {
                    endGame();
                }
            }, 2000);
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('streak').textContent = streak;
        }

        function endGame() {
            document.getElementById('feedback').innerHTML = `<div>Game Over! Skor akhir kamu: ${score}</div>`;
            document.getElementById('options-container').innerHTML = '';
        }

        function restartGame() {
            score = 0;
            lives = 3;
            streak = 0;
            updateScore();
            document.getElementById('feedback').textContent = '';
            loadNewQuestion();
        }

        // Inisialisasi game
        window.onload = loadNewQuestion;
    </script>
</body>
</html>
